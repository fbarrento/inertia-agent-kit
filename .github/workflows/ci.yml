name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  php-package:
    name: PHP Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Lint PHP files
        run: find config src tests resources -name '*.php' -type f -print0 | xargs -0 -n1 php -l

      - name: Run Pest suite
        run: composer test

  node-prototype:
    name: Node Prototype
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run smoke test
        run: npm test
