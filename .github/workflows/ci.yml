name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  php-package:
    name: PHP Package (Laravel ${{ matrix.laravel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - laravel: '12'
            laravel-framework: '^12.0'
            php: '8.3'
            testbench: '^10.0'
          - laravel: '13'
            laravel-framework: '^13.0'
            php: '8.3'
            testbench: '^11.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer update --with "laravel/framework:${{ matrix.laravel-framework }}" --with "orchestra/testbench:${{ matrix.testbench }}" --prefer-dist --no-interaction --no-progress

      - name: Lint PHP files
        run: find config src tests resources -name '*.php' -type f -print0 | xargs -0 -n1 php -l

      - name: Run static analysis
        run: composer lint:check

      - name: Run Pest suite
        run: composer test

  node-prototype:
    name: Node Prototype
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run smoke test
        run: npm test
